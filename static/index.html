<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Embed Vector Demo</title>
	<link rel="stylesheet" href="/style.css" />
</head>
<body>
	<main class="container">
		<h1>Text to Vector</h1>

		<label for="userInput">Input text</label>
		<textarea id="userInput" rows="4" placeholder="Type text to embed..."></textarea>

		<button id="embedBtn" type="button">Get Vector</button>

		<label for="vectorOutput">Returned vector</label>
		<textarea id="vectorOutput" rows="10" readonly placeholder="Vector will appear here..."></textarea>
	</main>

	<script src="/script.js"></script>
</body>
</html>
